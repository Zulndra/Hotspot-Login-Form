<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Koneksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Koneksi Aktif</h1>
            <p class="text-gray-600 mt-2">Anda sudah terhubung ke internet</p>
        </div>
        
        <!-- Info -->
        <div class="space-y-3 mb-6">
            <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                <span class="text-gray-600">Username:</span>
                <span class="font-semibold text-gray-800">$(username)</span>
            </div>
            <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                <span class="text-gray-600">IP Address:</span>
                <span class="font-semibold text-gray-800">$(ip)</span>
            </div>
            <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                <span class="text-gray-600">MAC Address:</span>
                <span class="font-semibold text-gray-800">$(mac)</span>
            </div>
            <div class="flex justify-between p-3 bg-gray-50 rounded-lg">
                <span class="text-gray-600">Session Time:</span>
                <span class="font-semibold text-gray-800">$(session-time)</span>
            </div>
        </div>
        
        <!-- Logout Button -->
        <a href="$(link-logout)" class="block w-full bg-red-500 hover:bg-red-600 text-white text-center py-3 rounded-lg font-semibold transition duration-300">
            Logout
        </a>
        
    </div>
    
</body>
</html>
